<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTM → Spotify Sync</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #242424;
      --ytm-red: #ff0033;
      --spot-green: #1db954;
      --text: #f0f0f0;
      --muted: #666;
      --pulse: #1db954;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.05em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .logo-arrow {
      color: var(--muted);
      font-size: 10px;
    }

    .logo-ytm { color: var(--ytm-red); }
    .logo-spot { color: var(--spot-green); }

    /* ── Toggle ── */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 10px;
      transition: background 0.2s;
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked ~ .toggle-track { background: rgba(29, 185, 84, 0.2); border: 1px solid var(--spot-green); }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); background: var(--spot-green); }

    /* ── Status Block ── */
    .status-block {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.playing {
      background: var(--spot-green);
      box-shadow: 0 0 8px var(--spot-green);
      animation: pulse 1.5s ease-in-out infinite;
    }

    .dot.error { background: #ff4444; }
    .dot.paused { background: #f0a500; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ── Track Card ── */
    .track-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      position: relative;
      overflow: hidden;
    }

    .track-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--ytm-red), transparent 40%, var(--spot-green));
    }

    .track-platform-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .platform-tag {
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .platform-tag.ytm {
      color: var(--ytm-red);
      background: rgba(255, 0, 51, 0.08);
      border: 1px solid rgba(255, 0, 51, 0.2);
    }

    .platform-tag.spotify {
      color: var(--spot-green);
      background: rgba(29, 185, 84, 0.08);
      border: 1px solid rgba(29, 185, 84, 0.2);
    }

    .track-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      line-height: 1.3;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .track-artist {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-empty {
      text-align: center;
      padding: 14px 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    /* ── Footer ── */
    .footer {
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-note {
      font-size: 9px;
      color: #333;
      letter-spacing: 0.06em;
    }

    .open-spotify-btn {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--spot-green);
      background: none;
      border: 1px solid rgba(29, 185, 84, 0.25);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: background 0.15s, border-color 0.15s;
    }

    .open-spotify-btn:hover {
      background: rgba(29, 185, 84, 0.08);
      border-color: rgba(29, 185, 84, 0.5);
    }

    /* ── Disabled overlay ── */
    .sync-off-msg {
      padding: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      letter-spacing: 0.04em;
    }

    .sync-off-msg span {
      display: block;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      color: #444;
      margin-bottom: 6px;
    }

    /* ── Mute badge ── */
    .mute-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 9px;
      color: #555;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .mute-badge svg {
      width: 10px; height: 10px;
      fill: #555;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <span class="logo-ytm">YTM</span>
    <span class="logo-arrow">→</span>
    <span class="logo-spot">SPOTIFY</span>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label">Sync</span>
    <label class="toggle">
      <input type="checkbox" id="syncToggle" />
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
  </div>
</div>

<div id="mainContent">
  <!-- filled by JS -->
</div>

<div class="footer">
  <div class="mute-badge">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
    </svg>
    Spotify muted
  </div>
  <button class="open-spotify-btn" id="openSpotify">Open Spotify ↗</button>
</div>

<script src="src/popup.js"></script>
</body>
</html>
